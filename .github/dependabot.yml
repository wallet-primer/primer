version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "primer-team"

  - package-ecosystem: "cargo"
    directory: "/contracts/health-monitor"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "primer-team"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "primer-team"
